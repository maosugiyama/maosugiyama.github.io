    function setLang(lang) {
      if (!T[lang]) return;
      const t = T[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (t[key] !== undefined) el.innerHTML = t[key];
      });
      document.documentElement.lang = t.html_lang || lang;
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      localStorage.setItem('lang', lang);
    }
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => setLang(btn.dataset.lang));
    });
    setLang(localStorage.getItem('lang') || 'ja');

    // カスタムカーソル（点と○）
    (function() {
      const dot  = document.createElement('div');
      const ring = document.createElement('div');
      dot.className  = 'cursor-dot';
      ring.className = 'cursor-ring';
      document.body.appendChild(dot);
      document.body.appendChild(ring);

      let mx = -200, my = -200, rx = -200, ry = -200;

      document.addEventListener('mousemove', (e) => {
        mx = e.clientX;
        my = e.clientY;
        dot.style.left = mx + 'px';
        dot.style.top  = my + 'px';
      });

      // ○は滑らかに遅延追従
      (function animRing() {
        rx += (mx - rx) * 0.13;
        ry += (my - ry) * 0.13;
        ring.style.left = rx + 'px';
        ring.style.top  = ry + 'px';
        requestAnimationFrame(animRing);
      })();

      // インタラクティブ要素にカーソルを合わせるとリングが拡大
      function attachHover(selector, bigW, bigH) {
        document.querySelectorAll(selector).forEach(el => {
          el.addEventListener('mouseenter', () => {
            ring.style.width   = bigW + 'px';
            ring.style.height  = bigH + 'px';
            ring.style.opacity = '0.80';
          });
          el.addEventListener('mouseleave', () => {
            ring.style.width   = '28px';
            ring.style.height  = '28px';
            ring.style.opacity = '0.55';
          });
        });
      }
      attachHover('a, button', 44, 44);
    })();

    // キリル文字ネットワークビジュアライゼーション
    (function() {
      const profile = document.querySelector('.profile-left');
      if (!profile) return;

      const W = profile.offsetWidth;
      const H = profile.offsetHeight;
      const N = 33;

      // エッジ描画用キャンバス
      const canvas = document.createElement('canvas');
      canvas.className = 'network-canvas';
      canvas.width  = W;
      canvas.height = H;
      profile.insertBefore(canvas, profile.firstChild);
      const ctx = canvas.getContext('2d');

      // ホバー時の画像ツールチップ
      const tip = document.createElement('div');
      tip.className = 'char-tooltip';
      document.body.appendChild(tip);

      // ノード生成
      const nodes = [];
      for (let i = 0; i < N; i++) {
        const w = 44 + Math.random() * 36;
        const h = Math.round(w * (0.56 + Math.random() * 0.18));
        const x = w + Math.random() * (W - w * 2);
        const y = h + Math.random() * (H - h * 2);

        const el  = document.createElement('div');
        el.className = 'network-node';
        el.style.width  = Math.round(w) + 'px';
        el.style.height = h + 'px';
        el.style.left   = (x - w / 2) + 'px';
        el.style.top    = (y - h / 2) + 'px';

        const img = document.createElement('img');
        img.className  = 'network-node-img';
        img.src        = 'image/chars/' + String(i + 1).padStart(2, '0') + '.png';
        img.alt        = '';
        img.draggable  = false;
        el.appendChild(img);
        profile.appendChild(el);

        const node = { el, img, x, y, vx: 0, vy: 0, w, h, pinned: false };
        nodes.push(node);

        // ホバー: 切り取り画像全体を表示 + カーソルリング拡大
        const cursorRing = document.querySelector('.cursor-ring');
        el.addEventListener('mouseenter', () => {
          tip.innerHTML = '';
          const ti = document.createElement('img');
          ti.src = img.src;
          tip.appendChild(ti);
          tip.style.display = 'block';
          if (cursorRing) {
            cursorRing.style.width   = '52px';
            cursorRing.style.height  = '52px';
            cursorRing.style.opacity = '0.80';
          }
        });
        el.addEventListener('mousemove', (e) => {
          tip.style.left = (e.clientX + 20) + 'px';
          tip.style.top  = Math.max(8, e.clientY - 160) + 'px';
        });
        el.addEventListener('mouseleave', () => {
          tip.style.display = 'none';
          if (cursorRing) {
            cursorRing.style.width   = '28px';
            cursorRing.style.height  = '28px';
            cursorRing.style.opacity = '0.55';
          }
        });

        // ドラッグ
        el.addEventListener('mousedown', (e) => {
          e.preventDefault();
          e.stopPropagation();
          node.pinned = true;
          el.classList.add('dragging');
          el.style.cursor = 'grabbing';
          tip.style.display = 'none';
          // ドラッグ開始時のカーソルとノード中心のオフセット
          const rect = profile.getBoundingClientRect();
          const ox = e.clientX - rect.left - node.x;
          const oy = e.clientY - rect.top  - node.y;
          function onMove(e) {
            const r = profile.getBoundingClientRect();
            node.x = Math.max(node.w / 2, Math.min(W - node.w / 2, e.clientX - r.left - ox));
            node.y = Math.max(node.h / 2, Math.min(H - node.h / 2, e.clientY - r.top  - oy));
            node.vx = 0; node.vy = 0;
            el.style.left = (node.x - node.w / 2) + 'px';
            el.style.top  = (node.y - node.h / 2) + 'px';
          }
          function onUp() {
            node.pinned = false;
            el.classList.remove('dragging');
            el.style.cursor = 'grab';
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup',   onUp);
            // ドラッグ後に再加熱して周囲を落ち着かせる
            alpha = 0.4;
            if (!rafId) rafId = requestAnimationFrame(tick);
          }
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup',   onUp);
        });
      }

      // スパースなエッジ（ネットワーク接続）
      const edges = [];
      for (let i = 0; i < N; i++) {
        const numE = 2 + Math.floor(Math.random() * 2);
        for (let k = 0; k < numE; k++) {
          const j = (i + 1 + Math.floor(Math.random() * (N - 1))) % N;
          edges.push([i, j]);
        }
      }

      // フォースシミュレーション（alpha decay で自然に静止）
      let alpha = 1.0;
      let rafId = null;

      function drawEdges() {
        ctx.clearRect(0, 0, W, H);
        ctx.strokeStyle = 'rgba(158,124,74,0.20)';
        ctx.lineWidth = 0.8;
        for (const [i, j] of edges) {
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.stroke();
        }
      }

      function tick() {
        const cx = W * 0.5, cy = H * 0.5;
        const ringR     = Math.min(W, H) * 0.38;
        const repulsion = 3200, spring = 0.022, restLen = 105;
        const ringK = 0.0018, damp = 0.82;

        // 毎フレーム冷却（alpha が十分小さくなったら停止）
        alpha *= 0.96;

        for (let i = 0; i < N; i++) {
          const a = nodes[i];
          if (a.pinned) continue;

          const dx0 = a.x - cx, dy0 = a.y - cy;
          const dist0 = Math.sqrt(dx0 * dx0 + dy0 * dy0) || 1;
          const pull = (dist0 - ringR) * ringK * alpha;
          a.vx -= (dx0 / dist0) * pull;
          a.vy -= (dy0 / dist0) * pull;

          if (dist0 < ringR * 0.55) {
            const cf = 5500 * alpha / (dist0 * dist0 + 1);
            a.vx += (dx0 / dist0) * cf;
            a.vy += (dy0 / dist0) * cf;
          }

          for (let j = i + 1; j < N; j++) {
            const b = nodes[j];
            const dx = a.x - b.x, dy = a.y - b.y;
            const d2 = dx * dx + dy * dy + 1;
            const d  = Math.sqrt(d2);
            const f  = repulsion * alpha / d2;
            const fx = (dx / d) * f, fy = (dy / d) * f;
            a.vx += fx; a.vy += fy;
            if (!b.pinned) { b.vx -= fx; b.vy -= fy; }
          }
        }

        for (const [i, j] of edges) {
          const a = nodes[i], b = nodes[j];
          const dx = b.x - a.x, dy = b.y - a.y;
          const d  = Math.sqrt(dx * dx + dy * dy) || 1;
          const f  = (d - restLen) * spring * alpha;
          const fx = (dx / d) * f, fy = (dy / d) * f;
          if (!a.pinned) { a.vx += fx; a.vy += fy; }
          if (!b.pinned) { b.vx -= fx; b.vy -= fy; }
        }

        for (const n of nodes) {
          if (n.pinned) continue;
          n.vx *= damp; n.vy *= damp;
          n.x  += n.vx;  n.y  += n.vy;
          n.x = Math.max(n.w / 2, Math.min(W - n.w / 2, n.x));
          n.y = Math.max(n.h / 2, Math.min(H - n.h / 2, n.y));
          n.el.style.left = (n.x - n.w / 2) + 'px';
          n.el.style.top  = (n.y - n.h / 2) + 'px';
        }

        drawEdges();

        if (alpha > 0.001) {
          rafId = requestAnimationFrame(tick);
        } else {
          rafId = null; // 静止：ループ停止
        }
      }
      rafId = requestAnimationFrame(tick);
    })();
  </script>
