            desc: 'ロシアとは、ユーラシア大陸に位置する世界最大の面積を持つ国家である。1991年のソビエト連邦解体後に成立したロシア連邦を指す。スラブ語派に属するロシア語を公用語とし、多民族・多言語社会を形成する。' },
      en: { name: 'Russia',
            desc: 'Russia refers to the Russian Federation, the world\'s largest country by area, located on the Eurasian continent, established after the dissolution of the Soviet Union in 1991. Russian, belonging to the Slavic language family, is the official language, forming a multi-ethnic and multilingual society.' },
      ru: { name: 'Россия',
            desc: 'Россия — крупнейшее по площади государство мира, расположенное на Евразийском континенте. Российская Федерация образована после распада СССР в 1991 году. Официальный язык — русский, относящийся к славянской группе языков; страна представляет собой многонациональное и многоязычное общество.' }
    }
  ];

  // ── UI ────────────────────────────────────────────────────────────────
  const kwList  = document.getElementById('keyword-list');
  const panel   = document.getElementById('kw-panel');
  const kwTitle = document.getElementById('kw-title');
  const kwBody  = document.getElementById('kw-body');
  const btnClose = document.getElementById('kw-close');
  let activeKey = null;
  let currentLang = 'ja';

  function renderKeywords(lang) {
    // 既存の子要素をすべて削除
    while (kwList.firstChild) kwList.removeChild(kwList.firstChild);
    KW_DATA.forEach(function(kw) {
      var li = document.createElement('li');
      li.className = 'keyword-tag' + (kw.key === activeKey ? ' active' : '');
      li.dataset.key = kw.key;
      var entry = kw[lang] || kw['ja'];
      li.textContent = entry.name;
      li.addEventListener('click', function() { onTagClick(kw.key); });
      kwList.appendChild(li);
    });
    // パネルが開いていれば言語に合わせて更新
    if (activeKey) updatePanel(activeKey, lang);
  }

  function updatePanel(key, lang) {
    const kw = KW_DATA.find(k => k.key === key);
    if (!kw) return;
    const d = kw[lang] || kw.ja;
    kwTitle.textContent = d.name;
    kwBody.textContent  = d.desc;
  }

  function onTagClick(key) {
    if (activeKey === key) {
      // 同じキーワード → 閉じる
      activeKey = null;
      panel.hidden = true;
      document.querySelectorAll('.keyword-tag').forEach(t => t.classList.remove('active'));
    } else {
      activeKey = key;
      document.querySelectorAll('.keyword-tag').forEach(t =>
        t.classList.toggle('active', t.dataset.key === key)
      );
      updatePanel(key, currentLang);
      panel.hidden = false;
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }

  btnClose.addEventListener('click', () => {
    activeKey = null;
    panel.hidden = true;
    document.querySelectorAll('.keyword-tag').forEach(t => t.classList.remove('active'));
  });

  // ── 言語切り替え ─────────────────────────────────────────────────────
  function setLang(lang) {
    if (!T[lang]) return;
    currentLang = lang;
    const t = T[lang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (t[key] !== undefined) el.innerHTML = t[key];
    });
    document.documentElement.lang = t.html_lang || lang;
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });
    localStorage.setItem('lang', lang);
    renderKeywords(lang);
  }

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => setLang(btn.dataset.lang));
  });

  setLang(localStorage.getItem('lang') || 'ja');
  </script>
</body>
</html>
